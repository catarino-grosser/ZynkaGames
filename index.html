<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zynka RPG</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Zynka RPG</strong>
      <small>Plataforma de aventuras interativas</small>
    </div>
    <button id="resetBtn" class="ghost">Apagar progresso</button>
  </header>

  <main>
    <section id="homeScreen" class="screen active">
      <div class="hero">
        <span class="badge">Protótipo v2.0</span>
        <h1>Escolha sua aventura</h1>
        <p>O motor do jogo é separado das histórias. Você pode adicionar novas aventuras por arquivo JavaScript ou carregar aventuras do Firebase.</p>
        <div id="dataSource" class="notice"></div>
      </div>
      <div id="adventureList" class="grid"></div>
    </section>

    <section id="characterScreen" class="screen">
      <button class="backBtn ghost">← Voltar</button>
      <div class="panel">
        <h2 id="selectedAdventureTitle"></h2>
        <p id="selectedAdventureDesc"></p>
        <label>Nome do herói</label>
        <input id="heroName" placeholder="Ex: Catarino, Aria, Thor..." />
        <label>Classe</label>
        <div class="classes">
          <button class="class-card" data-class="Guerreiro"><strong>Guerreiro</strong><span>Mais vida e força</span></button>
          <button class="class-card" data-class="Mago"><strong>Mago</strong><span>Mais ataque, menos vida</span></button>
          <button class="class-card" data-class="Ladino"><strong>Ladino</strong><span>Mais ouro e agilidade</span></button>
        </div>
        <button id="startAdventureBtn" class="primary">Começar aventura</button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="game-layout">
        <aside class="sidebar">
          <h2 id="heroDisplay"></h2>
          <small id="adventureDisplay"></small>
          <div class="stats">
            <div><strong id="hpDisplay">0</strong><span>Vida</span></div>
            <div><strong id="atkDisplay">0</strong><span>Ataque</span></div>
            <div><strong id="goldDisplay">0</strong><span>Ouro</span></div>
          </div>
          <h3>Inventário</h3>
          <ul id="inventoryList"></ul>
          <button id="homeBtn" class="ghost full">Menu</button>
        </aside>
        <article class="story-card">
          <span id="chapterTag" class="badge"></span>
          <h1 id="storyTitle"></h1>
          <p id="storyText"></p>
          <div id="battleBox" class="battle hidden"></div>
          <div id="choices" class="choices"></div>
        </article>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
