<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zynka RPG 3.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Versão 3.0 • Campanhas narrativas</p>
        <h1>Zynka RPG</h1>
      </div>
      <button id="resetBtn" class="ghost">Resetar progresso</button>
    </header>

    <main>
      <section id="homeScreen" class="screen active">
        <div class="hero-card">
          <h2>Escolha uma aventura interativa</h2>
          <p>Motor narrativo com campanhas de até 50 capítulos.</p>
        </div>
        <div id="adventureList" class="grid"></div>
      </section>

      <section id="characterScreen" class="screen">
        <button class="backBtn ghost">← Voltar</button>
        <div class="panel">
          <h2 id="selectedAdventureTitle">Criar personagem</h2>
          <p id="selectedAdventureDesc"></p>
          <label for="heroName">Nome do herói</label>
          <input id="heroName" type="text" maxlength="24" placeholder="Ex: Catarino, Luna, Ragnar" />
          <div class="class-grid">
            <button class="class-card" data-class="Guerreiro">⚔️<strong>Guerreiro</strong><span>Mais vida, defesa e ataque equilibrado.</span></button>
            <button class="class-card" data-class="Mago">🔮<strong>Mago</strong><span>Ataque forte, vida menor e orbe inicial.</span></button>
            <button class="class-card" data-class="Ladino">🗡️<strong>Ladino</strong><span>Mais ouro inicial, agilidade e gazua.</span></button>
          </div>
          <button id="startAdventureBtn" class="primary">Começar aventura</button>
        </div>
      </section>

      <section id="gameScreen" class="screen">
        <div class="game-layout">
          <aside class="status-card">
            <button id="homeBtn" class="ghost full">🏠 Aventuras</button>
            <h3 id="heroDisplay">Herói</h3>
            <p id="adventureDisplay"></p>
            <div class="stat"><span>Vida</span><strong id="hpDisplay">0</strong></div>
            <div class="stat"><span>Ataque</span><strong id="atkDisplay">0</strong></div>
            <div class="stat"><span>Defesa</span><strong id="defDisplay">0</strong></div>
            <div class="stat"><span>Nível</span><strong id="levelDisplay">1</strong></div>
            <div class="stat"><span>XP</span><strong id="xpDisplay">0</strong></div>
            <div class="stat"><span>Ouro</span><strong id="goldDisplay">0</strong></div>
            <div class="inventory">
              <h4>Inventário</h4>
              <ul id="inventoryList"></ul>
            </div>
          </aside>

          <article class="story-card">
            <p id="chapterTag" class="eyebrow"></p>
            <img id="chapterImage" class="chapter-image hidden" alt="Imagem do capítulo" />
            <h2 id="storyTitle"></h2>
            <div id="sceneBox" class="scene-box hidden"></div>
            <div id="dialogueBox" class="dialogue-box hidden"></div>
            <p id="storyText"></p>
            <div id="sideQuestBox" class="sidequest hidden"></div>
            <div id="eventBox" class="event-box hidden"></div>
            <div id="battleBox" class="battle hidden"></div>
            <div id="choices" class="choices"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <audio id="musicPlayer" loop></audio>
  <audio id="sfxPlayer"></audio>
  <script type="module" src="script.js"></script>
</body>
</html>
